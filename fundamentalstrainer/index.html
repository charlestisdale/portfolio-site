<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT Learning Platform</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="search-mode.css" />
  <link rel="stylesheet" href="mode-shell.css" />
  <link rel="stylesheet" href="dashboard-mode.css" />
  <link rel="stylesheet" href="progress.css" />
  <link rel="stylesheet" href="assessment-mode.css" />
  <link rel="stylesheet" href="study-path-mode.css" />
  <link rel="stylesheet" href="graph-visualizer.css" />
  <link rel="stylesheet" href="import-center-mode.css" />
</head>
<body>
  <main class="shell">
    <section class="hero card">
      <p class="eyebrow">Knowledge-first IT Learning Platform</p>
      <h1>IT Learning Platform</h1>
      <p>Reusable learning engine. Certification-specific content packs. Knowledge objects first, assessments later.</p>
      <div id="platformStats" class="summary-grid"></div>
    </section>

    <nav class="mode-nav card">
      <button class="mode-tab active" data-mode-target="dashboard" type="button">Dashboard</button>
      <button class="mode-tab" data-mode-target="import" type="button">Import</button>
      <button class="mode-tab" data-mode-target="learn" type="button">Learn</button>
      <button class="mode-tab" data-mode-target="path" type="button">Path</button>
      <button class="mode-tab" data-mode-target="search" type="button">Search</button>
      <button class="mode-tab" data-mode-target="assessment" type="button">Assessment</button>
      <button class="mode-tab" data-mode-target="jobs" type="button">Jobs</button>
      <button class="mode-tab" data-mode-target="graph" type="button">Graph</button>
      <button class="mode-tab" data-mode-target="commands" type="button">Commands</button>
    </nav>

    <section class="mode-panel active" data-mode-panel="dashboard"><section id="dashboardView"></section></section>
    <section class="mode-panel" data-mode-panel="import"><section id="importCenterView"></section></section>
    <section class="mode-panel" data-mode-panel="learn"><section id="conceptView" class="content"></section></section>
    <section class="mode-panel" data-mode-panel="path"><section id="studyPathView"></section></section>

    <section class="mode-panel" data-mode-panel="search">
      <aside class="card search-mode-card">
        <h2>Concept Search</h2>
        <input id="searchBox" placeholder="Search ipconfig, Task Manager, DHCP..." />
        <div id="results"></div>
      </aside>
    </section>

    <section class="mode-panel" data-mode-panel="assessment"><section id="assessmentView"></section></section>
    <section class="mode-panel" data-mode-panel="jobs"><section id="jobsActivity" class="jobs-activity-mount"></section></section>

    <section class="mode-panel" data-mode-panel="graph">
      <section class="card">
        <h2>Related Graph</h2>
        <p class="muted">Select a concept in Learn or Search mode to view its graph relationships.</p>
        <div id="relatedView"></div>
      </section>
    </section>

    <section class="mode-panel" data-mode-panel="commands">
      <section class="card">
        <h2>Command Index</h2>
        <ul id="commandView"></ul>
      </section>
    </section>
  </main>

  <script type="module" src="app.js?v=20260624-import-review-system"></script>
  <script type="module" src="engine/modes/graph-auto-center.js?v=20260625-graph-auto-center-v2"></script>
  <script type="module" src="engine/review/import-review-controller.js?v=20260624-import-review-system"></script>
</body>
</html>
